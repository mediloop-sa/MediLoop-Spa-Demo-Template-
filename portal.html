<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediLoop | Secure Owner Portal</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', sans-serif; background-color: #2E1A29; color: #FBF9F6; display: flex; align-items: center; justify-content: center; height: 100vh; flex-direction: column; }
        .glass-panel { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); backdrop-filter: blur(20px); padding: 50px; border-radius: 20px; width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        h2 { font-family: 'Georgia', serif; font-weight: normal; letter-spacing: 4px; text-transform: uppercase; margin-bottom: 30px; }
        .input-field { width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: white; box-sizing: border-box; }
        .btn-login { background: #FBF9F6; color: #2E1A29; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; margin-bottom: 20px; }
        .btn-login:hover { background: #8C7A87; color: #FBF9F6; }
        .dashboard-mockup { display: none; text-align: left; }
        .email-list { background: rgba(0,0,0,0.2); padding: 20px; border-radius: 8px; margin-bottom: 20px; font-family: monospace; }
        .export-btn { background: #8FA89B; color: #2E1A29; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <p style="font-family: 'Georgia', serif; letter-spacing: 4px; color: #8C7A87; margin-bottom: 20px;">MEDILOOP WEBSITES</p>

    <div class="glass-panel" id="login-view">
        <h2>Secure Portal</h2>
        <input type="password" class="input-field" placeholder="Enter Master Password">
        <button class="btn-login" onclick="mockLogin()">Access Data</button>
        <p style="font-size: 0.8rem; color: #8C7A87;">Protected by AES-256 Encryption</p>
    </div>

    <div class="glass-panel dashboard-mockup" id="dash-view" style="width: 600px;">
        <h2>Client Directory</h2>
        <p style="color: #8C7A87; margin-bottom: 20px;">Active Newsletter Subscribers</p>
        <div class="email-list">
            client1@example.com<br>
            vip.guest@gmail.com<br>
            bookings@wellness.co.za
        </div>
        <button class="export-btn">Download CSV for Outlook/Gmail</button>
    </div>

    <script>
        // Simple visual toggle to show the client how the portal works
        function mockLogin() {
            document.getElementById('login-view').style.display = 'none';
            document.getElementById('dash-view').style.display = 'block';
        }
    </script>
</body>
</html>
